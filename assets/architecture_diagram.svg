<svg width="1500" height="560" viewBox="0 0 1500 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="560" fill="#F7FBF8"/>
  <text x="70" y="74" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#163326">Tomato Leaf Disease Detection Pipeline</text>
  <text x="72" y="116" font-family="Arial, sans-serif" font-size="22" fill="#54615A">Confidence-aware computer vision workflow used in the final project stage</text>

  <defs>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M2 2 L14 8 L2 14 Z" fill="#708078"/>
    </marker>
    <style>
      .box { fill: #FFFFFF; stroke-width: 4; }
      .label { font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .small { font-family: Arial, sans-serif; font-size: 22px; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect class="box" x="70" y="230" width="190" height="120" rx="22" stroke="#2F7D4B"/>
  <text class="small" x="165" y="278" fill="#2F7D4B">Image</text>
  <text class="small" x="165" y="310" fill="#2F7D4B">Input</text>

  <line x1="280" y1="290" x2="340" y2="290" stroke="#708078" stroke-width="5" marker-end="url(#arrow)"/>

  <rect class="box" x="350" y="230" width="190" height="120" rx="22" stroke="#2867B2"/>
  <text class="small" x="445" y="274" fill="#2867B2">Preprocess</text>
  <text class="small" x="445" y="306" fill="#2867B2">Resize + Normalize</text>

  <line x1="560" y1="290" x2="620" y2="290" stroke="#708078" stroke-width="5" marker-end="url(#arrow)"/>

  <rect class="box" x="630" y="230" width="190" height="120" rx="22" stroke="#163326"/>
  <text class="label" x="725" y="274" fill="#163326">EfficientNet</text>
  <text class="label" x="725" y="306" fill="#163326">Classifier</text>

  <line x1="840" y1="290" x2="900" y2="290" stroke="#708078" stroke-width="5" marker-end="url(#arrow)"/>

  <rect class="box" x="910" y="230" width="190" height="120" rx="22" stroke="#D99A28"/>
  <text class="small" x="1005" y="274" fill="#D99A28">Calibration</text>
  <text class="small" x="1005" y="306" fill="#D99A28">+ TTA</text>

  <line x1="1120" y1="290" x2="1180" y2="290" stroke="#708078" stroke-width="5" marker-end="url(#arrow)"/>

  <rect class="box" x="1190" y="230" width="220" height="120" rx="22" stroke="#D64545"/>
  <text class="label" x="1300" y="274" fill="#D64545">Accept / Reject</text>
  <text class="label" x="1300" y="306" fill="#D64545">Decision</text>

  <rect x="70" y="420" width="1360" height="78" rx="18" fill="#EAF6EF" stroke="#B7DEC5" stroke-width="2"/>
  <text x="100" y="468" font-family="Arial, sans-serif" font-size="22" fill="#163326">Final reported metrics: 94.42% test accuracy | 91.99% macro-F1 | 96.35% accepted-case accuracy | 96.71% coverage</text>
</svg>
